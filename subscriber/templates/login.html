<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 路燈系統控制面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft JhengHei', 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 10px;
            padding: 40px;
            width: 360px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }
        .login-box h1 {
            color: #e94560;
            font-size: 20px;
            text-align: center;
            margin-bottom: 8px;
        }
        .login-box .subtitle {
            color: #aaa;
            font-size: 13px;
            text-align: center;
            margin-bottom: 25px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: #0f3460;
            border: 1px solid #533483;
            border-radius: 5px;
            color: #fff;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e94560;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-1px); }
        .error {
            background: rgba(233, 69, 96, 0.15);
            border-left: 3px solid #e94560;
            color: #ff8a9b;
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 13px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>路燈系統控制面板</h1>
        <p class="subtitle">請輸入管理員帳號登入</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>帳號</label>
                <input type="text" name="username" autofocus required>
            </div>
            <div class="form-group">
                <label>密碼</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn-login">登入</button>
        </form>
    </div>
</body>
</html>
